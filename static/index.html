<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sent-2 Imagery</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root {
    --bg: #10141a; --panel: #171d26; --border: #2a3442;
    --text: #e6edf3; --muted: #8b98a9; --accent: #38bdf8; --danger: #ff3d71;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  header { padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  header h1 { font-size: 16px; margin: 0; letter-spacing: .03em; }
  header h1 span { color: var(--accent); }
  .ctrl { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); }
  select, button, input[type=text] {
    background: #202836; color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer;
  }
  input[type=text] { cursor: text; width: 230px; }
  input[type=text]::placeholder { color: var(--muted); }
  button.primary { background: var(--accent); color: #06202e; border: none; font-weight: 600; }
  button.active { background: var(--accent); color: #06202e; border: none; font-weight: 600; }
  #map.drawing { cursor: crosshair; }
  button.detect { background: var(--danger); color: #fff; border: none; font-weight: 600; }
  button:disabled { opacity: .45; cursor: default; }
  #status { font-size: 13px; color: var(--muted); margin-left: auto; max-width: 46ch; }
  #status.err { color: var(--danger); }
  #map { flex: 1; }
  .legend { position: absolute; bottom: 18px; right: 12px; z-index: 1000; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--muted); }
  .legend b { color: var(--text); }
  .sw { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 5px; }
</style>
</head>
<body>
<header>
  <h1>Sent-<span>2</span> Imagery</h1>
  <input type="text" id="query" placeholder="What are you looking for? e.g. jets at this airport">
  <div class="ctrl">Area
    <select id="size">
      <option value="4">4 km</option>
      <option value="8" selected>8 km</option>
      <option value="15">15 km</option>
    </select>
  </div>
  <div class="ctrl">Max cloud
    <select id="cloud">
      <option value="10">10%</option>
      <option value="30" selected>30%</option>
      <option value="60">60%</option>
      <option value="95">any</option>
    </select>
  </div>
  <button id="draw">✏️ Draw area</button>
  <button id="fetch" class="primary" disabled>Fetch latest imagery</button>
  <button id="detect" class="detect" disabled>Detect targets (AI)</button>
  <div class="ctrl"><label><input type="checkbox" id="showBoxes" checked> highlights</label></div>
  <div id="status">Drag a box over an area (or click a point), then fetch.</div>
</header>
<div id="map"></div>
<div class="legend" id="legend">
  <b>Legend</b><br>
  <span class="sw" style="background:#00e5ff"></span>boat / ship<br>
  <span class="sw" style="background:#ff3d71"></span>airplane
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map').setView([25.77, -80.15], 11);   // Miami — plenty of boats
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

const statusEl = document.getElementById('status');
const fetchBtn = document.getElementById('fetch');
const detectBtn = document.getElementById('detect');
const drawBtn = document.getElementById('draw');
const showBoxes = document.getElementById('showBoxes');

let picked = null, marker = null, overlay = null, scene = null;
let boxLayer = L.layerGroup().addTo(map);
let cleanUrl = null, annotatedUrl = null;

// Selected area: either a drawn rectangle (selectionRect) or a click point.
let selectionRect = null, selectedBounds = null;

function setStatus(msg, err = false) {
  statusEl.textContent = msg;
  statusEl.className = err ? 'err' : '';
}

function clearSelection() {
  if (marker) { marker.remove(); marker = null; }
  if (selectionRect) { selectionRect.remove(); selectionRect = null; }
  selectedBounds = null;
  picked = null;
}

// --- Click a point (default mode) -------------------------------------------
map.on('click', e => {
  if (drawing) return;               // clicks are for point-pick only
  clearSelection();
  picked = e.latlng;
  marker = L.marker(picked).addTo(map);
  fetchBtn.disabled = false;
  setStatus(`Picked ${picked.lat.toFixed(4)}, ${picked.lng.toFixed(4)} — fetch imagery.`);
});

// --- Drag a rectangle (draw mode) -------------------------------------------
let drawing = false, dragStart = null;

drawBtn.onclick = () => {
  drawing = !drawing;
  drawBtn.classList.toggle('active', drawing);
  map.getContainer().classList.toggle('drawing', drawing);
  if (drawing) {
    map.dragging.disable();
    setStatus('Draw mode: drag a box over the area you want. Click the button again to pan.');
  } else {
    map.dragging.enable();
    setStatus('Pan mode. Drag the map, or turn on Draw area to select a box.');
  }
};

map.on('mousedown', e => {
  if (!drawing) return;
  clearSelection();
  dragStart = e.latlng;
  selectionRect = L.rectangle([dragStart, dragStart],
    {color: '#38bdf8', weight: 2, dashArray: '5', fillOpacity: 0.08}).addTo(map);
});

map.on('mousemove', e => {
  if (!drawing || !dragStart) return;
  selectionRect.setBounds(L.latLngBounds(dragStart, e.latlng));
});

map.on('mouseup', e => {
  if (!drawing || !dragStart) return;
  const b = L.latLngBounds(dragStart, e.latlng);
  dragStart = null;
  if (b.getNorth() - b.getSouth() < 1e-4 || b.getEast() - b.getWest() < 1e-4) {
    setStatus('Box too small — drag a larger area.', true);
    if (selectionRect) { selectionRect.remove(); selectionRect = null; }
    return;
  }
  selectedBounds = b;
  fetchBtn.disabled = false;
  const km = (b.getNorth() - b.getSouth()) * 111;
  setStatus(`Area selected (~${km.toFixed(1)} km tall). Fetch imagery, or turn off Draw area to pan.`);
});

function updateLegend(colors) {
  const el = document.getElementById('legend');
  el.innerHTML = '<b>Legend</b><br>' + Object.entries(colors)
    .map(([label, c]) => `<span class="sw" style="background:${c}"></span>${label}`)
    .join('<br>');
}

fetchBtn.onclick = async () => {
  fetchBtn.disabled = detectBtn.disabled = true;
  boxLayer.clearLayers();
  const query = document.getElementById('query').value.trim();
  let size_km = +document.getElementById('size').value;
  let max_cloud = +document.getElementById('cloud').value;
  let targets = [];

  if (query) {
    setStatus('Asking the AI how to set up this search…');
    try {
      const pr = await fetch('/api/plan', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({query})
      });
      const plan = await pr.json();
      if (pr.ok) {
        // A drawn box wins over the AI's suggested area size.
        size_km = plan.size_km; max_cloud = plan.max_cloud; targets = plan.targets;
        updateLegend(plan.colors);
        const area = selectedBounds ? 'your drawn area' : `${plan.size_km} km`;
        setStatus(`AI plan: ${plan.targets.join(', ')} · ${area} · <${plan.max_cloud}% cloud — ${plan.reason}`);
      }
    } catch (e) { /* fall back to manual settings */ }
  }

  const body = {max_cloud, targets};
  if (selectedBounds) {
    body.bbox = [selectedBounds.getWest(), selectedBounds.getSouth(),
                 selectedBounds.getEast(), selectedBounds.getNorth()];
  } else {
    body.lat = picked.lat; body.lon = picked.lng; body.size_km = size_km;
  }

  setStatus('Searching Copernicus archive & downloading latest scene…');
  try {
    const r = await fetch('/api/fetch', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || r.statusText);
    scene = j;
    cleanUrl = j.image_url; annotatedUrl = null;
    if (selectionRect) { selectionRect.remove(); selectionRect = null; }
    if (overlay) overlay.remove();
    overlay = L.imageOverlay(j.image_url, j.bounds, {opacity: 1}).addTo(map);
    map.fitBounds(j.bounds);
    if (j.colors) updateLegend(j.colors);
    const when = new Date(j.datetime).toLocaleString();
    const what = j.targets ? ` Looking for: ${j.targets.join(', ')}.` : '';
    setStatus(`Scene from ${when} · ${j.cloud_cover.toFixed(0)}% cloud.${what} Ready to detect.`);
    detectBtn.disabled = false;
  } catch (e) {
    setStatus('Fetch failed: ' + e.message, true);
  }
  fetchBtn.disabled = false;
};

detectBtn.onclick = async () => {
  detectBtn.disabled = true;
  boxLayer.clearLayers();
  setStatus('Starting qwen2.5vl detection…');
  try {
    const r = await fetch('/api/detect', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({key: scene.key})
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || r.statusText);
    poll();
  } catch (e) {
    setStatus(e.message, true);
    detectBtn.disabled = false;
  }
};

async function poll() {
  const r = await fetch('/api/detect/status?key=' + scene.key);
  const j = await r.json();
  if (j.state === 'running') {
    setStatus(`Analysing tiles with qwen2.5vl… ${j.done}/${j.total}`);
    setTimeout(poll, 1500);
    return;
  }
  detectBtn.disabled = false;
  if (j.state === 'failed') { setStatus('Detection failed: ' + j.error, true); return; }
  const res = j.result;
  annotatedUrl = res.annotated_url + '?t=' + Date.now();
  if (showBoxes.checked) overlay.setUrl(annotatedUrl);
  for (const d of res.detections) {
    L.rectangle(d.bounds, {color: d.color || '#ffd400', weight: 2, fillOpacity: 0.08})
      .bindPopup(d.label).addTo(boxLayer);
  }
  setStatus(res.count === 0
    ? 'Analysis finished — nothing detected in this scene.'
    : `Found ${res.count} object${res.count > 1 ? 's' : ''} — click a box for its label.`);
}

showBoxes.onchange = () => {
  if (!overlay) return;
  if (showBoxes.checked) {
    if (annotatedUrl) overlay.setUrl(annotatedUrl);
    map.addLayer(boxLayer);
  } else {
    overlay.setUrl(cleanUrl);
    map.removeLayer(boxLayer);
  }
};
</script>
</body>
</html>
